name: Bioinformatics Pipeline CI

on:
  push:
    branches:
      - github-actions
      - feature
      - new_docker

jobs:
  pipeline-test:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Workflow Initialized
        run: echo "CI/CD Pipeline Started"

      - name: Build Docker Image
        run: docker build -t pipeline-stimulator:latest .

      - name: Run Docker Container
        run: docker run pipeline-stimulator:latest