name: Bioinformatics Pipeline CI

on:
  push:
    branches:
      - main
      - github-actions
      - feature
      - new_docker

jobs:
  pipeline-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Structure
        run: |
          echo "===== REPO FILES ====="
          ls -R

      - name: Build Docker Image
        run: docker build -t pipeline-simulator:latest .

      - name: Run Pipeline Container
        run: |
          docker run --rm \
          -v ${{ github.workspace }}/data:/data \
          -v ${{ github.workspace }}/reference:/reference \
          -v ${{ github.workspace }}/output:/output \
          pipeline-simulator:latest \
          /data/raw/normal_R1.fastq.gz \
          /reference/phix.fa

      - name: Inspect Output Folder
        run: |
          echo "===== OUTPUT CONTENT ====="
          ls -R output || echo "No output folder created"

      - name: Verify Output Exists
        run: |
          if [ ! -f output/result.txt ]; then
            echo "ERROR: result.txt not found"
            exit 1
          fi

      - name: Done
        run: echo "Pipeline completed successfully"