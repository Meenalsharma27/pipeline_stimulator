name: Bioinformatics Pipeline CI

on:
  push:
    branches:
      - main
      - github-actions
      - feature
      - new_docker

jobs:
  pipeline-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Workflow Initialized
        run: echo "CI/CD Pipeline Started"

      - name: Build Docker Image
        run: docker build -t pipeline-simulator:latest .

      - name: Run Pipeline Container
        run: |
          docker run --rm \
          -v ${{ github.workspace }}/data:/data \
          -v ${{ github.workspace }}/reference:/reference \
          pipeline-simulator:latest \
          /data/raw/fastq.fastq.gz \
          /reference/phix.fa

      - name: Verify Output
        run: |
          if [ ! -f output/result.txt ]; then
            echo "Pipeline failed: output file not found"
            exit 1
          fi

      - name: Done
        run: echo "Pipeline completed successfully"