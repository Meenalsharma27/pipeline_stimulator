name: Bioinformatics Pipeline CI

on:
  push:
    branches:
      - main
      - github-actions
      - feature
      - new_docker

jobs:
  pipeline-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Show Repository Structure
        run: |
          echo "===== REPO FILES ====="
          ls -R

      - name: Build Docker Image
        run: docker build -t pipeline-simulator:latest .

      - name: Run Pipeline Container
        run: |
          docker run --rm \
          -v ${{ github.workspace }}/data:/data \
          -v ${{ github.workspace }}/reference:/reference \
          -v ${{ github.workspace }}/results:/app/results \
          -v ${{ github.workspace }}/logs:/app/logs \
          pipeline-simulator:latest \
          /data/raw/normal_R1.fastq.gz \
          /reference/phix.fa

      - name: Inspect Results Folder
        run: |
          echo "===== RESULTS CONTENT ====="
          ls -R results || echo "No results folder created"

            - name: Verify FastQC Output
            
        run: |
          ls results/qc/pre_trim/*_fastqc.html

      - name: Verify MultiQC Output
        run: |
          ls results/qc/pre_trim/multiqc_report*.html

      - name: Verify Trimmed FASTQ
        run: |
          ls results/trim/*_trimmed.fastq.gz

      - name: Verify fastp Reports
        run: |
          ls results/trim/*_fastp.html
          ls results/trim/*_fastp.json

      - name: Verify Alignment Outputs
        run: |
          ls results/alignment/*.sam
          ls results/alignment/*.bam
          ls results/alignment/*_sorted.bam
          ls results/alignment/*_sorted.bam.bai

      - name: Verify Log Files
        run: |
          ls logs/qc.log
          ls logs/trim.log
          ls logs/alignment.log
          ls logs/variant_call.log
              
      - name: Verify Variant Output Exists
        run: |
          set -e
          shopt -s nullglob
          if [ -z "$(printf '%s\n' results/variants/*.vcf)" ]; then
            echo "ERROR: no VCF file found in results/variants"
            exit 1
          fi
          echo "Variant output found:"
          ls -1 results/variants/*.vcf

      - name: Done
        run: echo "Pipeline completed successfully"